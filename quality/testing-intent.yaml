version: 2
domain: testing

scope:
  solutionPath: Incursa.Quic.slnx
  includes:
    - src/Incursa.Quic
    - src/Incursa.Quic.InteropHarness
    - tests/Incursa.Quic.Tests

expectations:
  evidence:
    - inventory
    - results
    - coverage
  confidenceTarget: high

coverage:
  lineMin: 0.50
  branchMin: 0.40
  criticalFiles:
    - src/Incursa.Quic/QuicPacketParser.cs
    - src/Incursa.Quic/QuicFrameCodec.cs
    - src/Incursa.Quic/QuicStreamParser.cs
    - src/Incursa.Quic/QuicTransportParametersCodec.cs
    - src/Incursa.Quic/QuicVariableLengthInteger.cs

  scenarios:
    requiredTests:
      - tests/Incursa.Quic.Tests/ScaffoldTests.cs::LibraryAssemblyCanBeLoaded
      - tests/Incursa.Quic.Tests/ScaffoldTests.cs::PublicApiBaselineFilesExist
      - tests/Incursa.Quic.Tests/RequirementHomes/INT/REQ-QUIC-INT-0006.cs::HarnessParsesRoleTestCaseRequestListAndFixedMountPaths
      - tests/Incursa.Quic.Tests/RequirementHomes/INT/REQ-QUIC-INT-0007.cs::UnsupportedInteropTestCasesReturn127WithoutPretendingTlsSupport
      - tests/Incursa.Quic.Tests/RequirementHomes/INT/REQ-QUIC-INT-0008.cs::EndpointHostShellBridgesTheLibraryRuntimeThroughAConnectedUdpSocketAndSurfacesOutboundHandshakeDatagrams
      - tests/Incursa.Quic.Tests/RequirementHomes/INT/REQ-QUIC-INT-0008.cs::RouteMissesRemainUnroutableAndDoNotReachTheRuntimeConsumer

intentionalGaps:
  - subject: benchmarks
    rationale: Permanent benchmark suites live under `benchmarks/`, but the normalized quality sync surface only ingests test and coverage evidence.


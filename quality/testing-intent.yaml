version: 2
domain: testing

scope:
  solutionPath: Incursa.Quic.slnx
  includes:
    - src/Incursa.Quic
    - tests/Incursa.Quic.Tests

expectations:
  evidence:
    - inventory
    - results
    - coverage
  confidenceTarget: high

coverage:
  lineMin: 0.50
  branchMin: 0.40
  criticalFiles:
    - src/Incursa.Quic/QuicPacketParser.cs
    - src/Incursa.Quic/QuicFrameCodec.cs
    - src/Incursa.Quic/QuicStreamParser.cs
    - src/Incursa.Quic/QuicTransportParametersCodec.cs
    - src/Incursa.Quic/QuicVariableLengthInteger.cs

scenarios:
  requiredTests:
    - tests/Incursa.Quic.Tests/ScaffoldTests.cs::LibraryAssemblyCanBeLoaded
    - tests/Incursa.Quic.Tests/ScaffoldTests.cs::PublicApiBaselineFilesExist

intentionalGaps:
  - subject: benchmarks
    rationale: Permanent benchmark suites live under `benchmarks/`, but the normalized quality sync surface only ingests test and coverage evidence.

related:
  docs:
    - docs/requirements-workflow.md
    - docs/spec-trace-prep.md
    - overview.md
    - layout.md
    - authoring.md
  files:
    - benchmarks/README.md
    - fuzz/README.md
    - src/Incursa.Quic/README.md
    - tests/Incursa.Quic.Tests/README.md
    - specs/requirements/quic/README.md
    - specs/architecture/quic/README.md
    - specs/architecture/quic/ARC-QUIC-HDR-0001.md
    - specs/work-items/quic/README.md
    - specs/verification/quic/README.md
    - specs/requirements/quic/SPEC-QUIC-HDR.md
    - specs/verification/quic/VER-QUIC-HDR-0001.md
    - specs/requirements/quic/REQUIREMENT-GAPS.md
    - specs/templates/spec-template.md
    - specs/templates/verification-template.md
  workItems:
    - specs/work-items/quic/WI-QUIC-HDR-0001.md
  codeRefs:
    - src/Incursa.Quic/QuicPacketParser.cs
    - src/Incursa.Quic/QuicFrameCodec.cs
    - src/Incursa.Quic/QuicStreamParser.cs
    - src/Incursa.Quic/QuicTransportParametersCodec.cs
    - src/Incursa.Quic/QuicVariableLengthInteger.cs

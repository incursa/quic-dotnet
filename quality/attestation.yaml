version: 1

scope:
  include:
    - specs/requirements
    - specs/architecture
    - specs/work-items
    - specs/verification

outputs:
  directory: artifacts/quality/attestation
  emit: both

sources:
  results: artifacts/quality/raw/test-results
  coverage: artifacts/quality/raw/coverage
  benchmarks: artifacts/quality/raw/benchmarks
  manual_qa: artifacts/quality/raw/manual-qa

refresh:
  commands:
    - name: generate-raw-quality-evidence
      command: pwsh -File scripts/quality/run-smoke-tests.ps1

    - name: sync-quality-evidence
      command: dotnet tool run workbench quality sync --results artifacts/quality/raw/test-results --coverage artifacts/quality/raw/coverage

status_maps:
  work_items:
    done:
      - done
      - closed
      - completed
      - shipped
    in_progress:
      - in_progress
      - in-progress
      - active
      - doing
    open:
      - open
      - todo
      - planned
      - new
    blocked:
      - blocked
      - waiting
      - on_hold

  verification:
    passing:
      - passed
      - pass
      - complete
      - verified
    failing:
      - failed
      - fail
      - regression
    pending:
      - pending
      - planned
      - in_progress
      - in-progress
      - not_run
    unknown:
      - unknown

freshness:
  verification_days: 14
  benchmarks_days: 14
  manual_qa_days: 30

scope:
  includes:
    - specs/requirements/quic
    - specs/architecture/quic
    - specs/work-items/quic
    - specs/verification/quic
  excludes:
    - specs/requirements/spec-trace

evidenceRoots:
  qualityTesting:
    - artifacts/quality/testing
  testResults:
    - artifacts/quality/raw/test-results
  coverage:
    - artifacts/quality/raw/coverage
  benchmarks:
    - quality/benchmarks
  manualQa:
    - quality/manual-qa

execution:
  tests:
    command: pwsh
    args:
      - -NoLogo
      - -NoProfile
      - -File
      - scripts/quality/run-quality-evidence.ps1
  coverage:
    command: dotnet
    args:
      - tool
      - run
      - workbench
      - quality
      - sync
      - --results
      - artifacts/quality/raw/test-results
      - --coverage
      - artifacts/quality/raw/coverage

statusPolicy:
  workItems:
    done:
      - completed
      - complete
      - cancelled
      - superseded
    inProgress:
      - in_progress
    open:
      - planned
    blocked:
      - blocked

  verifications:
    passing:
      - passed
      - waived
    failing:
      - failed
    pending:
      - planned
    stale:
      - obsolete

freshness:
  staleAfterDays: 14

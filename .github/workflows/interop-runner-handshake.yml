name: Interop Runner Handshake

on:
  workflow_dispatch:

jobs:
  handshake-corroboration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout quic-dotnet
        uses: actions/checkout@v6
        with:
          path: quic-dotnet

      - name: Checkout quic-interop-runner
        uses: actions/checkout@v6
        with:
          repository: quic-interop/quic-interop-runner
          path: quic-interop-runner

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Show runner prerequisites
        shell: pwsh
        run: |
          docker --version
          python --version

      - name: Run server-role handshake cell
        working-directory: quic-dotnet
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/interop/Invoke-QuicInteropRunner.ps1 `
            -RunnerRoot "${{ github.workspace }}/quic-interop-runner" `
            -LocalRole server `
            -PeerImplementationSlots quic-go `
            -TestCases handshake

      - name: Upload interop runner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-runner-handshake-${{ github.run_id }}
          path: quic-dotnet/artifacts/interop-runner/
          if-no-files-found: warn

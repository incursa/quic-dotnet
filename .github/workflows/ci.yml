name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Validate SpecTrace surfaces
        shell: pwsh
        run: |
          ./scripts/spec-trace/Render-SpecTraceMarkdownFromJson.ps1 -Check
          ./scripts/Validate-SpecTraceJson.ps1 -Profiles core
          ./scripts/Assert-No-SpecTraceCue.ps1

      - name: Restore
        run: dotnet restore Incursa.Quic.slnx

      - name: Build
        run: dotnet build Incursa.Quic.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test Incursa.Quic.slnx --no-build --configuration Release

      - name: Pack
        run: dotnet pack src/Incursa.Quic/Incursa.Quic.csproj --configuration Release --no-build /p:ContinuousIntegrationBuild=true

name: Library Fast Quality

on:
  workflow_dispatch:
  pull_request:

jobs:
  fast-library-lane:
    runs-on: ubuntu-latest
    concurrency:
      group: library-fast-quality-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Incursa.Quic.slnx

      - name: Build
        run: dotnet build Incursa.Quic.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Run blocking lane
        shell: pwsh
        run: pwsh -NoProfile -File scripts/quality/run-blocking-tests.ps1 -NoRestore -NoBuild

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: library-fast-quality-artifacts
          path: |
            artifacts/test-results/blocking/
